services:
  snmp-2-ntfy:
    image: ghcr.io/brettsimons/snmp-2-ntfy:latest
    container_name: snmp-2-ntfy
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_BIND_SERVICE
    environment:
      - NTFY_URL=https://ntfy.example.com
      - NTFY_TOKEN=your_bearer_token
      - SNMP_COMMUNITIES=your_community
      # - NTFY_TOPIC=              # override topic (default: use SNMP community)
      # - NTFY_PRIORITY=           # override priority (default: derived from severity)
      # - NTFY_TAGS=               # extra comma-separated tags
      # - LOG_LEVEL=DEBUG
